<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>Login - Meenakshi Sundararajan Engineering College</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            min-width: 1200px;
        }

        body {
            min-width: 1200px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 25%, #1e40af 50%, #dc2626 75%, #b91c1c 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Animated background elements */
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            opacity: 0.05;
            animation: float 20s infinite ease-in-out;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            background: white;
            border-radius: 50%;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .shape-2 {
            width: 200px;
            height: 200px;
            background: white;
            border-radius: 50%;
            bottom: -50px;
            right: -50px;
            animation-delay: 3s;
        }

        .shape-3 {
            width: 150px;
            height: 150px;
            background: white;
            bottom: 20%;
            left: 10%;
            border-radius: 50%;
            animation-delay: 6s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(30px) rotate(180deg); }
        }

        .container-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        /* Header Banner */
        .header-banner {
            width: 100%;
            max-width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 30px 20px;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .banner-content {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .logo-section {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .logo-item {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 16px;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            animation: scaleIn 0.6s ease-out;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .logo-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .text-section {
            text-align: center;
            color: white;
            max-width: 100%;
        }

        /* College name as main heading - shown clearly in animation */
        .text-section h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.85rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -0.3px;
            line-height: 1.3;
            animation: fadeInDown 0.8s ease-out 0.2s both;
            white-space: normal;
            word-wrap: break-word;
        }

        .text-section .subtitle {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: 0.2px;
            line-height: 1.4;
            margin-bottom: 0;
            animation: fadeInDown 0.8s ease-out 0.4s both;
        }

        @keyframes slideDownText {
            from {
                opacity: 1;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Login Form Container */
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25), inset 0 1px 1px rgba(255, 255, 255, 0.4);
            animation: scaleInForm 0.8s ease-out 0.2s backwards;
        }

        @keyframes scaleInForm {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .login-header p {
            font-size: 0.9rem;
            color: #64748b;
            font-weight: 400;
        }

        /* Role Selection */
        .role-selection {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            background: #f8fafc;
            padding: 8px;
            border-radius: 12px;
        }

        .role-btn {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid transparent;
            border-radius: 10px;
            background: white;
            color: #64748b;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .role-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s ease;
        }

        .role-btn:hover {
            background: #f1f5f9;
        }

        .role-btn.active {
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            color: white;
            box-shadow: 0 8px 20px rgba(30, 58, 138, 0.3);
            border-color: transparent;
        }

        .role-btn.active#btn-admin {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            box-shadow: 0 8px 20px rgba(220, 38, 38, 0.3);
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group:last-of-type {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #1e293b;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            position: relative;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            background: white;
            color: #1e293b;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            background: #f8fafc;
        }

        input::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1rem;
            padding: 4px 8px;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-password:hover {
            color: #1e293b;
        }

        /* Login Button */
        .login-btn {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 50%, #1ea0eb 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.6s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(37, 99, 235, 0.4);
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.2);
        }

        /* Demo Credentials Info */
        .credentials-info {
            background: linear-gradient(135deg, rgba(30, 58, 138, 0.05) 0%, rgba(37, 99, 235, 0.05) 100%);
            border: 1px solid rgba(37, 99, 235, 0.2);
            border-radius: 12px;
            padding: 16px;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #1e293b;
            line-height: 1.6;
        }

        .credentials-info strong {
            color: #0f172a;
            font-weight: 600;
        }

        .credentials-info em {
            display: block;
            margin-top: 8px;
            color: #64748b;
            font-size: 0.8rem;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            width: 90%;
            max-width: 420px;
            padding: 40px 32px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transform: scale(0.9) translateY(20px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .modal.show .modal-content {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .modal-icon-circle {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2rem;
            background: #f1f5f9;
            color: #2563eb;
        }

        .modal-content.status-success .modal-icon-circle {
            background: #dcfce7;
            color: #16a34a;
        }

        .modal-content.status-error .modal-icon-circle {
            background: #fee2e2;
            color: #dc2626;
        }

        .modal-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 12px;
        }

        .modal-message {
            color: #64748b;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .modal-btn {
            width: 100%;
            padding: 12px 24px;
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }

        .modal.show.shake {
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header-banner {
                padding: 20px 15px;
                margin-bottom: 30px;
            }

            .banner-content {
                gap: 15px;
            }

            .logo-item {
                width: 60px;
                height: 60px;
            }

            .text-section h1 {
                font-size: 1.5rem;
                animation: fadeInDown 0.8s ease-out 0.2s both;
            }

            .text-section .subtitle {
                font-size: 1.2rem;
                animation: fadeInDown 0.8s ease-out 0.4s both;
            }

            .login-card {
                padding: 40px 24px;
                max-width: 100%;
                margin: 0 20px;
            }

            .login-header h2 {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .container-wrapper {
                padding: 16px;
            }

            .header-banner {
                margin-bottom: 20px;
            }

            .banner-content {
                gap: 10px;
            }

            .logo-item {
                width: 50px;
                height: 50px;
            }

            .text-section h1 {
                font-size: 1.2rem;
                animation: fadeInDown 0.8s ease-out 0.2s both;
            }

            .text-section .subtitle {
                font-size: 1rem;
                animation: fadeInDown 0.8s ease-out 0.4s both;
            }

            .login-card {
                padding: 28px 20px;
            }

            .login-header h2 {
                font-size: 1.3rem;
            }

            .login-header p {
                font-size: 0.8rem;
            }

            .credentials-info {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container-wrapper">
        <!-- Header Banner -->
        <div class="header-banner">
            <div class="banner-content">
                <div class="logo-section">
                    <div class="logo-item">
                        <img src="image/college_logo.jpeg" alt="College Logo" onerror="this.style.display='none'">
                    </div>
                    <div class="logo-item">
                        <img src="image/college_tnea_logo.png" alt="TNEA Logo" onerror="this.style.display='none'">
                    </div>
                </div>
                <div class="text-section">
                    <h1>Meenakshi Sundararajan Engineering College</h1>
                    <p class="subtitle">Login Portal</p>
                </div>
            </div>
        </div>

        <!-- Login Form -->
        <div class="login-card">
            <div class="login-header">
                <h2>Welcome Back</h2>
                <p>Sign in to your account to continue</p>
            </div>

            <!-- Role Selection -->
            <div class="role-selection">
                <button class="role-btn active" onclick="setRole('student')" id="btn-student">
                    <i class="fas fa-user-graduate" style="margin-right: 6px;"></i> Student
                </button>
                <button class="role-btn" onclick="setRole('admin')" id="btn-admin">
                    <i class="fas fa-lock" style="margin-right: 6px;"></i> Admin
                </button>
            </div>

            <!-- Username Field -->
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
                </div>
            </div>

            <!-- Password Field -->
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('password')">
                        <i class="fas fa-eye" id="password-icon"></i>
                    </button>
                </div>
            </div>

            <!-- Login Button -->
            <button class="login-btn" onclick="handleLogin()">
                <span>Sign In</span>
            </button>

            <p style="text-align: center; margin-top: 12px;">
                <a href="javascript:void(0)" id="forgotPasswordLink" style="color: #2563eb; font-size: 0.9rem; cursor: pointer; text-decoration: underline;">Forgot password?</a>
            </p>

            <!-- Dark mode script will be injected below to apply saved preference -->

            
        </div>
    </div>

            <!-- Forgot Password Modal -->
            <div id="forgotPasswordModal" class="modal" style="display: none;">
                <div class="modal-content" style="max-width: 400px;">
                    <h3 class="modal-title">Forgot Password</h3>
                    <p class="modal-message">Enter your email or username to send a password reset request to the admin. Only the admin can change your password.</p>
                    <div class="form-group">
                        <input type="text" id="forgotEmailOrUser" placeholder="Email or username" style="width: 100%; padding: 10px; border-radius: 8px; border: 2px solid #e2e8f0;">
                    </div>
                    <button class="modal-btn" onclick="requestResetToken()">Send request to admin</button>
                    <button class="modal-btn" style="margin-top: 8px; background: #64748b;" onclick="closeForgotModal()">Close</button>
                </div>
            </div>

    <!-- Modal -->
    <div id="customModal" class="modal">
        <div class="modal-content" id="modalContent">
            <div class="modal-icon-circle" id="modalIcon">
                <i class="fas fa-info-circle"></i>
            </div>
            <h3 class="modal-title" id="modalTitle">Notice</h3>
            <p class="modal-message" id="modalMessage">Message goes here</p>
            <button class="modal-btn" onclick="closeModal()">OK, Got it</button>
        </div>
    </div>

    <script>
        let currentRole = 'student';

        function setRole(role) {
            currentRole = role;
            document.getElementById('btn-student').className = `role-btn ${role === 'student' ? 'active' : ''}`;
            document.getElementById('btn-admin').className = `role-btn ${role === 'admin' ? 'active' : ''}`;
        }

        function showModal(title, message, type = 'info') {
            const modal = document.getElementById('customModal');
            const modalContent = document.getElementById('modalContent');
            const modalIcon = document.getElementById('modalIcon');

            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalMessage').innerHTML = message.replace(/\n/g, '<br>');

            modalContent.className = 'modal-content';

            let iconClass = 'fa-info-circle';
            if (type === 'error') {
                modalContent.classList.add('status-error');
                iconClass = 'fa-times-circle';
            } else if (type === 'success') {
                modalContent.classList.add('status-success');
                iconClass = 'fa-check-circle';
            } else {
                modalContent.classList.add('status-info');
            }

            modalIcon.innerHTML = `<i class="fas ${iconClass}"></i>`;

            modal.style.display = 'flex';
            void modal.offsetWidth;
            modal.classList.add('show');

            if (type === 'error') {
                setTimeout(() => {
                    modal.classList.add('shake');
                }, 300);
            }
        }

        function closeModal() {
            const modal = document.getElementById('customModal');
            modal.classList.remove('show');
            modal.classList.remove('shake');
            setTimeout(() => {
                modal.style.display = 'none';
            }, 300);
        }

        function togglePasswordVisibility(inputId) {
            const passwordInput = document.getElementById(inputId);
            const icon = document.getElementById(inputId + '-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        window.onclick = function (event) {
            const modal = document.getElementById('customModal');
            const forgotModal = document.getElementById('forgotPasswordModal');
            if (event.target === modal) closeModal();
            if (event.target === forgotModal) closeForgotModal();
        }

        function openForgotPassword() {
            var m = document.getElementById('forgotPasswordModal');
            m.style.display = 'flex';
            m.offsetHeight;
            m.classList.add('show');
            document.getElementById('forgotEmailOrUser').value = '';
        }
        function closeForgotModal() {
            var m = document.getElementById('forgotPasswordModal');
            m.classList.remove('show');
            setTimeout(function () { m.style.display = 'none'; }, 300);
        }

        document.addEventListener('DOMContentLoaded', function () {
            var link = document.getElementById('forgotPasswordLink');
            if (link) link.addEventListener('click', function (e) { e.preventDefault(); openForgotPassword(); });
        });
        function requestResetToken() {
            const val = document.getElementById('forgotEmailOrUser').value.trim();
            if (!val) {
                showModal('Input Error', 'Enter your email or username.', 'error');
                return;
            }
            fetch('/api/forgot-password', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: val, username: val })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showModal('Request Sent', data.message || 'Your password reset request has been sent to the admin.', 'success');
                    closeForgotModal();
                } else {
                    showModal('Error', data.message || 'Request failed.', 'error');
                }
            })
            .catch(() => showModal('Connection Error', 'Could not reach server.', 'error'));
        }

        function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username) {
                showModal('Input Error', 'Please enter your username.', 'error');
                return;
            }
            if (!password) {
                showModal('Input Error', 'Please enter your password.', 'error');
                return;
            }

            const loginBtn = document.querySelector('.login-btn');
            const originalText = loginBtn.innerHTML;
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span>Signing in...</span>';

            fetch('/api/login', {
                method: 'POST',
                credentials: 'include',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username: username,
                    password: password,
                    role: currentRole
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    localStorage.setItem('userRole', data.user.role);
                    localStorage.setItem('username', data.user.username);
                    localStorage.setItem('userName', data.user.name);
                    localStorage.setItem('userId', data.user.id);
                    
                    showModal('Success', `Welcome, ${data.user.name}!\nRedirecting to dashboard...`, 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    showModal('Login Failed', data.message || 'Authentication failed!', 'error');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = originalText;
                }
            })
            .catch(error => {
                showModal('Connection Error', 'Unable to connect to server. Please ensure the server is running on localhost:3000', 'error');
                console.error('Error:', error);
                loginBtn.disabled = false;
                loginBtn.innerHTML = originalText;
            });
        }

    </script>

        window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
